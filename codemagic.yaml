workflows:
  ios-build:
    name: Flutter iOS Build
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      # Removemos a versão fixa do cocoapods aqui, pois será instalada via Homebrew
      vars:
        # Substitua pelos seus seus valores reais ou configure no Codemagic UI
        # As variáveis abaixo são para code signing e publicação. 
        # Para builds sem assinatura (--no-codesign), elas não são estritamente necessárias.
        # Mantenha BUNDLE_ID com um valor válido para o projeto Xcode.
        BUNDLE_ID: "com.yourcompany.yourapp"
        # APP_STORE_CONNECT_PRIVATE_KEY: |
        #   -----BEGIN PRIVATE KEY-----
        #   # Seu App Store Connect API Key aqui
        #   -----END PRIVATE KEY-----
        # CERTIFICATE_PRIVATE_KEY: |
        #   -----BEGIN PRIVATE KEY-----
        #   # Sua chave privada do certificado de distribuição aqui
        #   -----END PRIVATE KEY-----
        # APP_ID: "SEU_APP_ID_AQUI" # Ex: 1234567890
        # PROVISIONING_PROFILE_UUID: "SEU_PROFILE_UUID_AQUI"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true

    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/Library/Caches/CocoaPods # Adicionado cache para CocoaPods

    scripts:
      - name: Set up Flutter
        script: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods via Homebrew and clean cache
        script: |
          echo "Instalando/Atualizando CocoaPods via RubyGems..."
          # Instala CocoaPods via gem, que é mais robusto em ambientes CI como o Codemagic
          # e evita problemas de PATH/shadowing com Homebrew ou rbenv.
          sudo gem install cocoapods
          if [ $? -ne 0 ]; then
            echo "Erro: Falha ao instalar CocoaPods via RubyGems. Abortando." && exit 1
          fi
          echo "CocoaPods instalado/atualizado com sucesso via RubyGems."

          echo "Garantindo que o PATH do sistema esteja configurado para o binário do CocoaPods..."
          # Adiciona o diretório de gems ao PATH para garantir que o 'pod' seja encontrado
          export PATH="$(ruby -r rubygems -e 'puts Gem.user_dir')/bin:$PATH"
          export PATH="/usr/local/bin:$PATH" # Para compatibilidade
          export PATH="/opt/homebrew/bin:$PATH" # Para Apple Silicon
          echo "PATH atual: $PATH"
          echo "Versão do pod sendo usada: $(which pod)"

          echo "Limpando o cache do CocoaPods e removendo instalações anteriores para evitar problemas residuais..."
          pod cache clean --all
          # Remove Pods e Podfile.lock para garantir uma instalação limpa
          rm -rf Pods Podfile.lock

          echo "Navegando para o diretório iOS..."
          if [ -d "ios" ]; then
            cd ios
          else
            echo "Erro: Diretório 'ios' não encontrado. Abortando." && exit 1
          fi

          echo "Verificando e ajustando o Podfile..."
          if [ ! -f "Podfile" ]; then
            echo "Erro: Podfile não encontrado no diretório iOS. Abortando." && exit 1
          fi

          # 1. Garante que a linha platform :ios, '15.0' esteja presente no Podfile
          if grep -q "platform :ios" Podfile; then
            sed -i '' "s/^platform :ios.*$/platform :ios, '15.0'/" Podfile
            echo "Versão da plataforma iOS no Podfile ajustada para 15.0."
          else
            printf "platform :ios, '15.0'\n%s" "$(cat Podfile)" > Podfile
            echo "Linha 'platform :ios, 15.0' adicionada ao Podfile."
          fi

          # 2. Injeta a configuração do IPHONEOS_DEPLOYMENT_TARGET no bloco post_install existente.
          # Isso é crucial para resolver conflitos de dependência do Firebase e evitar múltiplos hooks.
          # Verifica se a configuração já existe para evitar duplicação.
          if ! grep -q "IPHONEOS_DEPLOYMENT_TARGET = '15.0'" Podfile; then
            sed -i '' "/flutter_additional_ios_build_settings(target)/a\\
              target.build_configurations.each do |config|\\
                config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = '15.0'\\
              end" Podfile
            echo "IPHONEOS_DEPLOYMENT_TARGET = '15.0' injetado no bloco post_install."
          else
            echo "IPHONEOS_DEPLOYMENT_TARGET já configurado no Podfile. Pulando injeção."
          fi

          echo "Instalando os pods com --repo-update..."
          pod install --repo-update
          if [ $? -ne 0 ]; then
            echo "Erro: pod install falhou. Verifique os logs acima." && exit 1
          fi
          echo "Pods instalados com sucesso."}]

      - name: Build iOS App
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com
