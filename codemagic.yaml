workflows:
  ios-unsigned-ipa:
    name: iOS IPA (no codesign)
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.dreamkeys.corretor"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Flutter deps
        script: |
          flutter clean
          flutter pub get

      - name: iOS pods
        script: |
          sudo gem install cocoapods
          ruby fix_podfile.rb
          cd ios
          pod install --repo-update
          cd ..

      - name: Build unsigned IPA
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com

  ios-appstore-ipa:
    name: iOS IPA (App Store signed)
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials # Codemagic UI → Environment variables → group
      vars:
        BUNDLE_ID: "com.dreamkeys.corretor"
        APP_STORE_CONNECT_ISSUER_ID: "16c95c07-bdde-48cf-8f2c-0815a11ebbd1"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "95D6586993"
        # APP_STORE_CONNECT_PRIVATE_KEY -> definir no Codemagic UI como SECRET
        # (conteúdo do arquivo .p8 baixado, incluindo "-----BEGIN PRIVATE KEY-----")

    scripts:
      - name: Flutter deps
        script: |
          flutter clean
          flutter pub get

      - name: Regenerate icons & strip alpha (Apple rejects PNGs com alpha no AppIcon)
        script: |
          set -ex
          # Regenera ícones a partir de assets/images/launcher_icon_from_favicon.png
          # com remove_alpha_ios: true conforme pubspec.yaml.
          dart run flutter_launcher_icons || flutter pub run flutter_launcher_icons:main

          # Belt-and-suspenders: força remoção de alpha em TODOS os PNGs do AppIcon
          # achatando com fundo branco. sips vem nativo no macOS.
          ICON_DIR="ios/Runner/Assets.xcassets/AppIcon.appiconset"
          for f in "$ICON_DIR"/*.png; do
            sips -s format png --setProperty hasAlpha NO "$f" --out "$f" || true
          done

      - name: iOS pods
        script: |
          sudo gem install cocoapods
          ruby fix_podfile.rb
          cd ios
          pod install --repo-update
          cd ..

      - name: Set up code signing
        script: |
          set -e

          echo "BUNDLE_ID: $BUNDLE_ID"
          keychain initialize

          # ---------------------------------------------------------------
          # Persistência da chave privada do certificado de distribuição.
          #
          # 1ª build (sem IOS_DISTRIBUTION_PRIVATE_KEY no env):
          #   - revogue todos os iOS/Apple Distribution certs em
          #     developer.apple.com → Certificates antes de rodar
          #   - geramos uma chave nova e printamos no log ao final
          #   - copie o bloco PRIVATE KEY do log e salve como SECRET no
          #     Codemagic UI: IOS_DISTRIBUTION_PRIVATE_KEY
          #
          # Builds seguintes (com IOS_DISTRIBUTION_PRIVATE_KEY definido):
          #   - reutilizam o mesmo cert/perfil, sem estourar a cota
          # ---------------------------------------------------------------
          if [ -n "$IOS_DISTRIBUTION_PRIVATE_KEY" ]; then
            echo "Reusing existing IOS_DISTRIBUTION_PRIVATE_KEY from secrets."
            printf '%s' "$IOS_DISTRIBUTION_PRIVATE_KEY" > /tmp/distribution_key.pem
          else
            echo "No IOS_DISTRIBUTION_PRIVATE_KEY secret found; generating a fresh RSA key."
            openssl genrsa -out /tmp/distribution_key.pem 2048
            GENERATED_NEW_KEY=1
          fi

          # Cria/usa cert + provisioning profile via API com a private key.
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/distribution_key.pem \
            --create

          keychain add-certificates
          xcode-project use-profiles

          if [ "$GENERATED_NEW_KEY" = "1" ]; then
            echo ""
            echo "=================================================================="
            echo "  COPY THE PRIVATE KEY BELOW AND SAVE AS A CODEMAGIC SECRET:"
            echo "  Name: IOS_DISTRIBUTION_PRIVATE_KEY"
            echo "  Group: app_store_credentials"
            echo "  Value: (include the BEGIN/END lines and everything between)"
            echo "=================================================================="
            cat /tmp/distribution_key.pem
            echo "=================================================================="
            echo "  After saving, future builds will reuse the same certificate"
            echo "  and never hit Apple's 3-cert quota again."
            echo "=================================================================="
          fi

      - name: Build signed IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com
      app_store_connect:
        # Usa as mesmas credenciais já cadastradas como env vars
        # (Issuer ID, Key ID e Private Key no grupo app_store_credentials).
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # Sobe direto para o TestFlight (testes internos).
        submit_to_testflight: true
        # Para submeter direto à App Store (revisão pública),
        # troque para `submit_to_app_store: true` quando estiver pronto.
