workflows:
  ios-unsigned-ipa:
    name: iOS IPA (no codesign)
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.dreamkeys.corretor"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Flutter deps
        script: |
          flutter clean
          flutter pub get

      - name: iOS pods
        script: |
          sudo gem install cocoapods
          ruby fix_podfile.rb
          cd ios
          pod install --repo-update
          cd ..

      - name: Build unsigned IPA
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com

  ios-appstore-ipa:
    name: iOS IPA (App Store signed)
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials # Codemagic UI → Environment variables → group
      vars:
        BUNDLE_ID: "com.dreamkeys.corretor"
        APP_STORE_CONNECT_ISSUER_ID: "16c95c07-bdde-48cf-8f2c-0815a11ebbd1"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "95D6586993"
        # APP_STORE_CONNECT_PRIVATE_KEY -> definir no Codemagic UI como SECRET
        # (conteúdo do arquivo .p8 baixado, incluindo "-----BEGIN PRIVATE KEY-----")

    scripts:
      - name: Flutter deps
        script: |
          flutter clean
          flutter pub get

      - name: iOS pods
        script: |
          sudo gem install cocoapods
          ruby fix_podfile.rb
          cd ios
          pod install --repo-update
          cd ..

      - name: Set up code signing
        script: |
          set -ex

          echo "BUNDLE_ID: $BUNDLE_ID"
          keychain initialize

          # Gera private key RSA usada pelo certificado de distribuição.
          # NOTE: cada build cria um novo IOS_DISTRIBUTION cert na Apple.
          # Apple aceita até 3 ativos por team — se atingir limite,
          # revogue antigos em developer.apple.com → Certificates.
          openssl genrsa -out /tmp/distribution_key.pem 2048

          # Cria cert + provisioning profile via API com a private key acima.
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/distribution_key.pem \
            --create

          # Instala o cert no keychain (password padrão vazio).
          keychain add-certificates

          # Aplica o profile no projeto Xcode.
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com
      app_store_connect:
        # Usa as mesmas credenciais já cadastradas como env vars
        # (Issuer ID, Key ID e Private Key no grupo app_store_credentials).
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # Sobe direto para o TestFlight (testes internos).
        submit_to_testflight: true
        # Para submeter direto à App Store (revisão pública),
        # troque para `submit_to_app_store: true` quando estiver pronto.
