workflows:
  ios-build:
    name: Flutter iOS Build
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      # Removemos a versão fixa do cocoapods aqui, pois será instalada via Homebrew
      vars:
        # Substitua pelos seus seus valores reais ou configure no Codemagic UI
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          # Seu App Store Connect API Key aqui
          -----END PRIVATE KEY-----
        CERTIFICATE_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          # Sua chave privada do certificado de distribuição aqui
          -----END PRIVATE KEY-----
        BUNDLE_ID: "com.yourcompany.yourapp"
        APP_ID: "SEU_APP_ID_AQUI" # Ex: 1234567890
        PROVISIONING_PROFILE_UUID: "SEU_PROFILE_UUID_AQUI"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true

    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/Library/Caches/CocoaPods # Adicionado cache para CocoaPods

    scripts:
      - name: Set up Flutter
        script: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods via Homebrew and clean cache
        script: |
          echo "Verificando e atualizando Homebrew..."
          # Tenta atualizar o Homebrew. Se falhar, o script continua, mas imprime um aviso.
          brew update || echo "Aviso: Homebrew update falhou, mas o script continuará."
          
          echo "Verificando instalação do CocoaPods via Homebrew..."
          # Verifica se o CocoaPods já está instalado via Homebrew
          if ! brew list cocoapods &>/dev/null; then
            echo "CocoaPods não encontrado via Homebrew. Instalando..."
            brew install cocoapods
          else
            echo "CocoaPods já instalado via Homebrew. Atualizando..."
            brew upgrade cocoapods
          fi

          echo "Garantindo que o PATH do Homebrew esteja configurado corretamente e desativando o aviso de shadowing..."
          export HOMEBREW_NO_PATH_SHADOW_CHECK=1 # Isso silencia o aviso de shadowing
          # Prioriza o Homebrew para Apple Silicon e Intel
          export PATH="/opt/homebrew/bin:$PATH"
          export PATH="/usr/local/bin:$PATH"
          echo "PATH atual: $PATH"
          echo "Versão do pod sendo usada: $(which pod)"

          echo "Limpando o cache do CocoaPods para evitar problemas residuais..."
          pod cache clean --all

          echo "Navegando para o diretório iOS..."
          if [ -d "ios" ]; then
            cd ios
          else
            echo "Erro: Diretório 'ios' não encontrado. Abortando." && exit 1
          fi

          echo "Verificando e ajustando o Podfile..."
          if [ ! -f "Podfile" ]; then
            echo "Erro: Podfile não encontrado no diretório iOS. Abortando." && exit 1
          fi

          # 1. Garante que a linha platform :ios, '13.0' esteja presente no Podfile
          if grep -q "platform :ios" Podfile; then
            sed -i '' "s/^platform :ios.*$/platform :ios, '13.0'/" Podfile
            echo "Versão da plataforma iOS no Podfile ajustada para 13.0."
          else
            printf "platform :ios, '13.0'\n%s" "$(cat Podfile)" > Podfile
            echo "Linha 'platform :ios, 13.0' adicionada ao Podfile."
          fi

          # 2. Injeta a configuração do IPHONEOS_DEPLOYMENT_TARGET no bloco post_install existente.
          # Isso é crucial para resolver conflitos de dependência do Firebase e evitar múltiplos hooks.
          # Verifica se a configuração já existe para evitar duplicação.
          if ! grep -q "IPHONEOS_DEPLOYMENT_TARGET = '13.0'" Podfile; then
            sed -i '' "/flutter_additional_ios_build_settings(target)/a\\
              target.build_configurations.each do |config|\\
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'\\
              end" Podfile
            echo "IPHONEOS_DEPLOYMENT_TARGET = '13.0' injetado no bloco post_install."
          else
            echo "IPHONEOS_DEPLOYMENT_TARGET já configurado no Podfile. Pulando injeção."
          fi

          echo "Instalando os pods com --repo-update..."
          pod install --repo-update
          if [ $? -ne 0 ]; then
            echo "Erro: pod install falhou. Verifique os logs acima." && exit 1
          fi
          echo "Pods instalados com sucesso."}]

      - name: Build iOS App
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com
