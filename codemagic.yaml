workflows:
  ios-unsigned-ipa:
    name: iOS IPA (no codesign)
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      flutter: stable
      xcode: 26.2
      vars:
        BUNDLE_ID: "com.dreamkeys.corretor"
        # Live Activity / Ilha Dinâmica: troque para "true" (ou no UI do Codemagic)
        # quando o App Group `group.com.dreamkeys.corretor` e "App Groups" estiverem ok.
        # Codemagic não aceita valor vazio — use "false" para build sem extension.
        ENABLE_LIVE_ACTIVITY: "false"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Flutter deps
        script: |
          flutter pub get

      - name: iOS pods
        script: |
          sudo gem install cocoapods
          ruby fix_podfile.rb
          # Cria a Widget Extension da Live Activity DEPOIS do fix_podfile
          # (que força os targets para iOS 15.0). No-op se ENABLE_LIVE_ACTIVITY
          # não estiver definido; nunca aborta o build.
          ruby setup_live_activity.rb
          cd ios
          pod install
          cd ..

      - name: Build unsigned IPA
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com

  ios-appstore-ipa:
    name: iOS IPA (App Store signed)
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      flutter: stable
      # 26.2+ obrigatório: device_info_plus 13.x usa isiOSAppOnVision (SDK iOS 26.1+).
      # Versão fixa (não "latest") para cache estável no passo Installing SDKs.
      xcode: 26.2
      groups:
        - app_store_credentials # Codemagic UI → Environment variables → group
      vars:
        BUNDLE_ID: "com.dreamkeys.corretor"
        APP_STORE_CONNECT_ISSUER_ID: "16c95c07-bdde-48cf-8f2c-0815a11ebbd1"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "95D6586993"
        # Live Activity / Ilha Dinâmica. Só ligue ("true") depois de criar o
        # App Group `group.com.dreamkeys.corretor` e habilitar a capability
        # "App Groups" nos bundle ids `com.dreamkeys.corretor` e
        # `com.dreamkeys.corretor.CheckInWidget` no portal Apple.
        # Apple + App Group já configurados — extension entra no IPA da App Store.
        ENABLE_LIVE_ACTIVITY: "true"
        # APP_STORE_CONNECT_PRIVATE_KEY -> definir no Codemagic UI como SECRET
        # (conteúdo do arquivo .p8 baixado, incluindo "-----BEGIN PRIVATE KEY-----")
        #
        # IOS_DISTRIBUTION_PRIVATE_KEY (SECRET, grupo app_store_credentials):
        # PEM RSA do certificado Apple Distribution que o CI usa. Sem isso a Apple
        # devolve 409 se já existir cert de distribuição na conta.
        #
        # Só na 1ª vez sem PEM: ALLOW_BOOTSTRAP_CERT=true, revogue um cert antigo em
        # developer.apple.com → Certificates, rode UM build, copie o PEM do log,
        # salve IOS_DISTRIBUTION_PRIVATE_KEY e volte ALLOW_BOOTSTRAP_CERT para false.
        ALLOW_BOOTSTRAP_CERT: "false"

    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - $HOME/Library/Developer/Xcode/DerivedData/CompilationCache.noindex

    scripts:
      - name: Flutter deps
        script: |
          flutter pub get

      - name: Regenerate icons (iOS sem alpha via flutter_launcher_icons)
        script: |
          set -ex
          # Ícones com remove_alpha_ios + background_color_ios no pubspec.
          # Não reprocessar com sips aqui: --setProperty hasAlpha NO costuma matar
          # o alpha contra branco e deixa o ícone "estourado" / saturado no ecrã.
          dart run flutter_launcher_icons || flutter pub run flutter_launcher_icons:main

      - name: iOS pods
        script: |
          sudo gem install cocoapods
          ruby fix_podfile.rb
          # Widget Extension da Live Activity (no-op sem ENABLE_LIVE_ACTIVITY).
          ruby setup_live_activity.rb
          cd ios
          pod install
          cd ..

      - name: Set up code signing
        script: |
          set -e

          echo "BUNDLE_ID: $BUNDLE_ID"

          if [ -z "${IOS_DISTRIBUTION_PRIVATE_KEY:-}" ]; then
            if [ "${ALLOW_BOOTSTRAP_CERT:-false}" != "true" ]; then
              echo ""
              echo "=================================================================="
              echo "  ERRO: IOS_DISTRIBUTION_PRIVATE_KEY não está no Codemagic."
              echo "  A Apple já tem certificado(s) de distribuição — criar outro"
              echo "  sem a chave privada correta gera HTTP 409."
              echo ""
              echo "  Opção B (recomendada): Codemagic → dreamkeysapp → Environment"
              echo "  variables → grupo app_store_credentials → Add variable"
              echo "    Name:  IOS_DISTRIBUTION_PRIVATE_KEY"
              echo "    Secure: ON"
              echo "    Value: PEM completo (-----BEGIN RSA PRIVATE KEY----- ... END-----)"
              echo "    que corresponde a um cert 'Apple Distribution' da conta."
              echo "    (exportar do Mac que já assina o app, ou PEM de build antigo)"
              echo ""
              echo "  Opção A (só se NÃO tiver o PEM):"
              echo "    1) developer.apple.com → Certificates"
              echo "    2) Revogue UM certificado 'Apple Distribution' antigo/não usado"
              echo "    3) No Codemagic UI, variável ALLOW_BOOTSTRAP_CERT = true"
              echo "    4) Rode UM build; no log 'Set up code signing' copie o PEM"
              echo "    5) Salve como IOS_DISTRIBUTION_PRIVATE_KEY; ALLOW_BOOTSTRAP_CERT=false"
              echo "=================================================================="
              exit 1
            fi
            echo ""
            echo "=================================================================="
            echo "  BOOTSTRAP: gerando chave nova (ALLOW_BOOTSTRAP_CERT=true)."
            echo "  Revogue antes um cert Distribution antigo se a Apple retornar 409."
            echo "=================================================================="
            echo ""
          fi
          keychain initialize

          # ---------------------------------------------------------------
          # Persistência da chave privada do certificado de distribuição.
          #
          # 1ª build (sem IOS_DISTRIBUTION_PRIVATE_KEY no env):
          #   - revogue todos os iOS/Apple Distribution certs em
          #     developer.apple.com → Certificates antes de rodar
          #   - geramos uma chave nova e printamos no log ao final
          #   - copie o bloco PRIVATE KEY do log e salve como SECRET no
          #     Codemagic UI: IOS_DISTRIBUTION_PRIVATE_KEY
          #
          # Builds seguintes (com IOS_DISTRIBUTION_PRIVATE_KEY definido):
          #   - reutilizam o mesmo cert/perfil, sem estourar a cota
          # ---------------------------------------------------------------
          if [ -n "$IOS_DISTRIBUTION_PRIVATE_KEY" ]; then
            echo "Reusing existing IOS_DISTRIBUTION_PRIVATE_KEY from secrets."
            printf '%s' "$IOS_DISTRIBUTION_PRIVATE_KEY" > /tmp/distribution_key.pem
          else
            echo "No IOS_DISTRIBUTION_PRIVATE_KEY secret found; generating a fresh RSA key."
            openssl genrsa -out /tmp/distribution_key.pem 2048
            GENERATED_NEW_KEY=1
          fi

          # Cria/usa cert + provisioning profile via API com a private key.
          if ! app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/distribution_key.pem \
            --create; then
            echo ""
            echo "=================================================================="
            echo "  fetch-signing-files falhou (ex.: 409 certificado já existe)."
            echo "  Defina IOS_DISTRIBUTION_PRIVATE_KEY com o PEM do cert existente"
            echo "  OU revogue um Apple Distribution em Certificates e use bootstrap."
            echo "=================================================================="
            exit 1
          fi

          # Perfil da Widget Extension (Ilha Dinâmica).
          # Identifiers/App Groups no portal podem estar OK e o PERFIL ainda ser antigo
          # (criado antes de ligar App Groups) — a Apple não atualiza perfil sozinha.
          if [ "$ENABLE_LIVE_ACTIVITY" = "true" ]; then
            WIDGET_BUNDLE="${BUNDLE_ID}.CheckInWidget"
            echo "Fetching signing files for widget: $WIDGET_BUNDLE"

            # Remove TODOS os perfis locais da widget para não reutilizar cache inválido.
            for prov_dir in \
              "$HOME/Library/MobileDevice/Provisioning Profiles" \
              "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles" \
              "$HOME/Library/Caches/codemagic" \
              "/Users/builder/Library/MobileDevice/Provisioning Profiles"; do
              [ -d "$prov_dir" ] || continue
              for prov in "$prov_dir"/*.mobileprovision; do
                [ -f "$prov" ] || continue
                if security cms -D -i "$prov" 2>/dev/null | grep -q "$WIDGET_BUNDLE"; then
                  echo "Removendo perfil local da widget: $(basename "$prov")"
                  rm -f "$prov"
                fi
              done
            done

            # Recria perfil App Store da extension (exige App Group já no Identifier).
            app-store-connect fetch-signing-files \
              "$WIDGET_BUNDLE" \
              --platform IOS \
              --type IOS_APP_STORE \
              --certificate-key=@file:/tmp/distribution_key.pem \
              --create \
              --verbose

            echo "Verificando App Groups no perfil da CheckInWidget..."
            WIDGET_OK=0
            for prov_dir in \
              "$HOME/Library/MobileDevice/Provisioning Profiles" \
              "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
              [ -d "$prov_dir" ] || continue
              for prov in "$prov_dir"/*.mobileprovision; do
                [ -f "$prov" ] || continue
                if security cms -D -i "$prov" 2>/dev/null | grep -q "$WIDGET_BUNDLE"; then
                  if security cms -D -i "$prov" 2>/dev/null | grep -q "group.com.dreamkeys.corretor"; then
                    echo "OK: $(basename "$prov") contém App Group"
                    WIDGET_OK=1
                    break 2
                  fi
                fi
              done
            done
            if [ "$WIDGET_OK" != "1" ]; then
              echo ""
              echo "=================================================================="
              echo "  ERRO: Perfil ${WIDGET_BUNDLE} ainda sem App Groups no .mobileprovision."
              echo "  Seu Identifier está OK — falta REGENERAR o perfil de provisionamento:"
              echo "    developer.apple.com → Profiles"
              echo "    → apague TODOS os perfis 'App Store' da 'Intellisys CheckIn Widget'"
              echo "    → (opcional) faça o mesmo para 'Dreamkeys Corretor' se o app principal"
              echo "       também usa App Groups"
              echo "    → rode o build Codemagic de novo (ele cria perfil novo com --create)"
              echo "=================================================================="
              exit 1
            fi
          fi

          keychain add-certificates
          xcode-project use-profiles --project ios/Runner.xcodeproj

          if [ "$GENERATED_NEW_KEY" = "1" ]; then
            echo ""
            echo "=================================================================="
            echo "  COPY THE PRIVATE KEY BELOW AND SAVE AS A CODEMAGIC SECRET:"
            echo "  Name: IOS_DISTRIBUTION_PRIVATE_KEY"
            echo "  Group: app_store_credentials"
            echo "  Value: (include the BEGIN/END lines and everything between)"
            echo "=================================================================="
            cat /tmp/distribution_key.pem
            echo "=================================================================="
            echo "  After saving, future builds will reuse the same certificate"
            echo "  and never hit Apple's 3-cert quota again."
            echo "=================================================================="
          fi

      - name: Show app version (CFBundleVersion)
        script: |
          set -e
          echo "=== pubspec version (marketing+build) — build number is after '+' ==="
          grep '^version:' pubspec.yaml || true
          echo "If publish fails with duplicate CFBundleVersion, bump only the +N in pubspec.yaml."

      - name: Build signed IPA
        script: |
          set -ex
          flutter build ipa --release
          echo "=== IPA gerado ==="
          ls -lah build/ios/ipa/
          IPA=$(find build/ios/ipa -maxdepth 1 -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERRO: nenhum .ipa em build/ios/ipa — upload TestFlight não vai ocorrer."
            exit 1
          fi
          echo "Arquivo para TestFlight: $IPA"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com
      app_store_connect:
        # Secrets no grupo app_store_credentials (Codemagic UI):
        #   APP_STORE_CONNECT_PRIVATE_KEY = conteúdo INTEIRO do .p8 (com BEGIN/END)
        #   APP_STORE_CONNECT_KEY_IDENTIFIER / ISSUER_ID (já em vars acima)
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # Upload + TestFlight (pós-processamento após build verde — pode levar 10–30 min na Apple).
        submit_to_testflight: true
        beta_groups:
          - Teste Dev Intellisys
        # Grupo externo (opcional; exige revisão beta da Apple):
        # - Teste Intellisys
