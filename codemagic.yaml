workflows:
  ios-unsigned-ipa:
    name: iOS IPA (no codesign)
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.dreamkeys.corretor"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Flutter deps
        script: |
          flutter clean
          flutter pub get

      - name: iOS pods
        script: |
          sudo gem install cocoapods
          ruby fix_podfile.rb
          cd ios
          pod install --repo-update
          cd ..

      - name: Build unsigned IPA
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com

  ios-appstore-ipa:
    name: iOS IPA (App Store signed)
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dreamkeys.corretor
      groups:
        - app_store_credentials # Codemagic UI → Environment variables → group
      vars:
        BUNDLE_ID: "com.dreamkeys.corretor"
        APP_STORE_CONNECT_ISSUER_ID: "16c95c07-bdde-48cf-8f2c-0815a11ebbd1"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "95D6586993"
        # APP_STORE_CONNECT_PRIVATE_KEY -> definir no Codemagic UI como SECRET
        # (conteúdo do arquivo .p8 baixado, incluindo "-----BEGIN PRIVATE KEY-----")
        # CERTIFICATE_PRIVATE_KEY -> opcional; com fetch-signing-files --create, é gerado pelo Codemagic

    scripts:
      - name: Flutter deps
        script: |
          flutter clean
          flutter pub get

      - name: iOS pods
        script: |
          sudo gem install cocoapods
          ruby fix_podfile.rb
          cd ios
          pod install --repo-update
          cd ..

      - name: Set up code signing
        script: |
          set -ex

          echo "===== API CREDENTIALS ====="
          echo "ISSUER_ID set: ${APP_STORE_CONNECT_ISSUER_ID:+yes}"
          echo "KEY_ID set: ${APP_STORE_CONNECT_KEY_IDENTIFIER:+yes}"
          echo "PRIVATE_KEY set: ${APP_STORE_CONNECT_PRIVATE_KEY:+yes}"
          echo "BUNDLE_ID: $BUNDLE_ID"

          keychain initialize

          echo "===== LIST EXISTING CERTS ====="
          app-store-connect certificates list --type IOS_DISTRIBUTION || true

          echo "===== LIST EXISTING BUNDLE IDS ====="
          app-store-connect bundle-ids list --bundle-id-identifier "$BUNDLE_ID" || true

          echo "===== LIST EXISTING PROFILES ====="
          app-store-connect profiles list --profile-type IOS_APP_STORE || true

          echo "===== CREATE IOS_DISTRIBUTION CERTIFICATE ====="
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --save \
            || echo "[warn] cert create falhou (talvez já exista)"

          echo "===== FETCH SIGNING FILES (cria profile se necessário) ====="
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --create

          echo "===== ADD CERTS TO KEYCHAIN ====="
          keychain add-certificates

          echo "===== DOWNLOADED PROFILES ====="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true

          echo "===== APPLY PROFILES IN XCODE PROJECT ====="
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - es553807@gmail.com
