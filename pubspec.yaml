name: Intellisys
description: "Intellisys - Sistema Imobiliário"
publish_to: 'none'

# App Store / TestFlight: o número depois do "+" vira CFBundleVersion no iOS.
# Tem de ser SEMPRE maior que qualquer build já enviado para esta app.
# Erro típico: "bundle version must be higher than … previousBundleVersion = N"
# → subir só o +N (ex. +14 → +15 → +16), commit, novo pipeline.
version: 1.0.6+37

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  http: ^1.2.0
  http_parser: ^4.0.2
  intl: ^0.20.2
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.5
  path: ^1.9.1
  local_auth: ^3.0.1
  image_picker: ^1.1.2
  image_cropper: ^12.2.1
  # Mantido na linha 12.0.0-beta de propósito: é a única do file_picker que
  # usa `win32 ^6`, exigido pela família *_plus (package_info_plus 10 /
  # device_info_plus 13). Baixar para a 11.x estável (win32 ^5) conflita o
  # solver. API usada: estática `FilePicker.pickFiles(...)`. Se o build do
  # Android falhar com "Unresolved reference 'FileUtils'", é cache de Kotlin
  # velho — rode `flutter clean` antes do `flutter build`.
  file_picker: ^12.0.0-beta.2
  google_fonts: ^8.1.0
  table_calendar: ^3.0.9
  socket_io_client: ^3.1.4
  url_launcher: ^6.2.5
  # Substitui o antigo `lucide_icons` (0.257.0, abandonado): aquela versão
  # estendia `IconData`, que virou `final class` no Flutter 3.44+ — o build
  # iOS quebrava com "The class 'IconData' can't be extended outside of its
  # library because it's a final class". Este fork (`lucide_icons_flutter`)
  # mantém a mesma API (`import .../lucide_icons.dart` + `LucideIcons.xxx`).
  lucide_icons_flutter: ^3.1.14+1
  device_info_plus: ^13.1.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^22.0.1
  permission_handler: ^12.0.1
  flutter_animate: ^4.5.2
  geolocator: ^14.0.0
  # Live Activities / Ilha Dinâmica (iOS 16.1+). Em iOS < 16.1 / Android o
  # plugin simplesmente não faz nada — o LiveActivityService trata tudo com
  # guarda de plataforma e try/catch, então adicionar a dependência não muda
  # o comportamento atual do app nem o build.
  live_activities: ^2.4.9
  package_info_plus: ^10.1.0
  custom_refresh_indicator: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  # Qualidade no launcher depende do PNG de origem: use pelo menos 1024×1024 px,
  # margens generosas e traços nítidos (evitar favicon 16×16 ou 32×32 ampliado).
  image_path: assets/images/launcher_icon_from_favicon.png
  adaptive_icon_background: '#000000'
  adaptive_icon_foreground: assets/images/launcher_icon_from_favicon.png
  # Menos que o default 16% enche demais o círculo; valor maior = ícone um pouco
  # menor no adaptive (menos "exposto" no launcher).
  adaptive_icon_foreground_inset: 18
  remove_alpha_ios: true
  background_color_ios: '#000000'

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/config/dev_lan_host.txt
    - assets/config/api_target.txt
    - assets/config/app_update.txt
