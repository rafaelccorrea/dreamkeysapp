name: Intellisys
description: "Intellisys - Sistema Imobiliário"
publish_to: 'none'

version: 1.0.6+11

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  http: ^1.2.0
  http_parser: ^4.0.2
  intl: ^0.20.2
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.5
  path: ^1.9.1
  local_auth: ^3.0.1
  image_picker: ^1.1.2
  image_cropper: ^12.2.1
  file_picker: ^12.0.0-beta.2
  google_fonts: ^8.1.0
  table_calendar: ^3.0.9
  lottie: ^3.0.0
  socket_io_client: ^3.1.4
  url_launcher: ^6.2.5
  lucide_icons: ^0.257.0
  device_info_plus: ^13.1.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  # Ícone “I” (favicon) — fundo preto atrás do PNG no launcher.
  image_path: assets/images/launcher_icon_from_favicon.png
  adaptive_icon_background: '#000000'
  adaptive_icon_foreground: assets/images/launcher_icon_from_favicon.png
  # Menos que o default 16% enche demais o círculo; valor maior = ícone um pouco
  # menor no adaptive (menos "exposto" no launcher).
  adaptive_icon_foreground_inset: 24
  remove_alpha_ios: true
  background_color_ios: '#000000'

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/config/dev_lan_host.txt
    - assets/config/api_target.txt
